<div class="module-block">
  <h2 class="fs-4"{% if include.show_id %} id="{{ include.week.title | slugify }}"{% endif %}>{{ include.week.title }} <span class="week-date">({{ include.week.date | date: "%B %-d" }})</span></h2>
  <div class="module">
    <dl>
      <dt>Topic</dt>
      <dd>{{ include.week.topic }}</dd>
      <dt>Assignment</dt>
      <dd>{{ include.week.assignment }}</dd>
      <dt>Readings</dt>
      <dd>{{ include.week.readings }}</dd>
    </dl>
  </div>
</div>
